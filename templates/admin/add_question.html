{% extends "base.html" %}
{% block title %}Add Question — DDCET{% endblock %}
{% block page_title %}Add Question{% endblock %}

{% block content %}
<div class="animate-fade" style="max-width:700px">
    <a href="{{ url_for('admin.bank_questions', bank_id=bank.id) }}" class="btn btn-ghost btn-sm"
        style="margin-bottom:16px">← Back to {{ bank.name }}</a>

    <div class="card">
        <h3 style="margin-bottom:16px">Add New Question</h3>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ g.csrf_token }}">
            <div class="grid grid-3 gap-12">
                <div class="form-group"><label class="form-label">Q No.</label><input type="number" name="qno"
                        class="form-input" required></div>
                <div class="form-group"><label class="form-label">Section</label>
                    <select name="section" class="form-select">
                        <option value="1">Section 1</option>
                        <option value="2">Section 2</option>
                    </select>
                </div>
                <div class="form-group"><label class="form-label">Topic</label><input type="text" name="topic"
                        class="form-input" required></div>
            </div>
            <div class="form-group"><label class="form-label">Question</label><textarea name="question"
                    class="form-textarea" rows="3" required></textarea></div>
            <div class="grid grid-2 gap-12">
                <div class="form-group"><label class="form-label">Option A</label><input type="text" name="option_a"
                        class="form-input" required></div>
                <div class="form-group"><label class="form-label">Option B</label><input type="text" name="option_b"
                        class="form-input" required></div>
                <div class="form-group"><label class="form-label">Option C</label><input type="text" name="option_c"
                        class="form-input" required></div>
                <div class="form-group"><label class="form-label">Option D</label><input type="text" name="option_d"
                        class="form-input" required></div>
            </div>
            <div class="form-group"><label class="form-label">Correct Answer</label>
                <select name="correct_ans" class="form-select">
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="X">X (Bonus)</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">Explanation (optional)</label><textarea name="explanation"
                    class="form-textarea" rows="2"></textarea></div>
            <div class="flex gap-12"><button type="submit" class="btn btn-primary">Save Question</button><a
                    href="{{ url_for('admin.bank_questions', bank_id=bank.id) }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
