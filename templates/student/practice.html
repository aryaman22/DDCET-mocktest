{% extends "base.html" %}
{% block title %}Practice — DDCET{% endblock %}

{% block content %}
<div class="practice-header">
    <div class="header-row">
        <div class="flex items-center gap-8">
            <span class="font-bold text-sm">🎯 Practice</span>
            {% if topic_drill %}<span class="badge badge-muted">{{ topic_drill }}</span>{% endif %}
        </div>
        <div class="flex items-center gap-16">
            <span class="text-sm font-mono" id="q-counter">Q 1 / {{ question_count }}</span>
            <span class="text-sm" id="accuracy-display" style="color:var(--green)">Accuracy: 0%</span>
        </div>
    </div>
    <div class="practice-progress">
        <div class="fill" id="progress-fill" style="width:0%"></div>
    </div>
</div>

<div class="practice-main animate-fade" id="practice-container">
    {# Rendered by practice.js #}
</div>

<script>
    window.SESSION_ID = {{ practice.id }};
    window.PRACTICE_QUESTIONS = {{ questions_json | safe }};
    window.CSRF_TOKEN = "{{ g.csrf_token }}";
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/practice.js') }}"></script>
{% endblock %}
