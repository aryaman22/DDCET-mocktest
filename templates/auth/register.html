{% extends "base.html" %}
{% block title %}Register — DDCET{% endblock %}
{% block nav %}{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>📝 Create Account</h1>
        <p class="subtitle">Register as a student to start practicing</p>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <input type="hidden" name="csrf_token" value="{{ g.csrf_token }}">
            <div class="form-group">
                <label for="name">Full Name <span style="color: var(--danger);">*</span></label>
                <input type="text" name="name" id="name" class="form-control" placeholder="Enter your full name"
                    required>
            </div>
            <div class="form-group">
                <label for="enrollment_number">Enrollment Number <span style="color: var(--danger);">*</span></label>
                <input type="text" name="enrollment_number" id="enrollment_number" class="form-control"
                    placeholder="Enter your enrollment number" required>
            </div>
            <div class="form-group">
                <label for="engineering_branch">Engineering Branch <span style="color: var(--danger);">*</span></label>
                <select name="engineering_branch" id="engineering_branch" class="form-control" required>
                    <option value="" disabled selected>Select your branch</option>
                    <option value="Civil Engineering">Civil Engineering</option>
                    <option value="Mechanical Engineering">Mechanical Engineering</option>
                    <option value="Electrical Engineering">Electrical Engineering</option>
                    <option value="Computer Science and Engineering">Computer Science and Engineering</option>
                    <option value="Computer Engineering">Computer Engineering</option>
                    <option value="Chemical Engineering">Chemical Engineering</option>
                    <option value="IT Engineering">IT Engineering</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="email">Email Address <span style="color: var(--danger);">*</span></label>
                <input type="email" name="email" id="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password <span style="color: var(--danger);">*</span></label>
                <input type="password" name="password" id="password" class="form-control"
                    placeholder="Min 8 chars, at least 1 number" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password <span style="color: var(--danger);">*</span></label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control"
                    placeholder="Re-enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">🚀 Register</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
