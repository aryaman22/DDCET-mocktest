{% extends "base.html" %}
{% block title %}Reset Password — DDCET{% endblock %}

{% block content %}
<div class="auth-layout">
    <div class="auth-brand">
        <h1>🔒 Set New Password</h1>
        <p>Choose a strong password for your DDCET account.</p>
    </div>
    <div class="auth-form-side">
        <div class="auth-card">
            <h2>New Password</h2>
            <p class="auth-subtitle">Must be at least 8 characters with 1 number</p>

            <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
                <input type="hidden" name="csrf_token" value="{{ g.csrf_token }}">
                <div class="form-group">
                    <label class="form-label" for="password">New Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="password" name="password" class="form-input"
                            placeholder="Enter new password" required>
                        <button type="button" class="pw-toggle" onclick="togglePw('password')" tabindex="-1">👁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="confirm_password" name="confirm_password" class="form-input"
                            placeholder="Confirm new password" required>
                        <button type="button" class="pw-toggle" onclick="togglePw('confirm_password')" tabindex="-1">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="margin-top:8px">🔑 Reset Password</button>
            </form>

            <p class="auth-link" style="margin-top:16px"><a href="{{ url_for('auth.login') }}">← Back to Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
